name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: mockforge-linux-x64
            use_cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: mockforge-linux-arm64
            use_cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: mockforge-darwin-x64
            use_cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: mockforge-darwin-arm64
            use_cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: mockforge-win32-x64.exe
            use_cross: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Cross (if required)
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build binary (Standard)
        if: ${{ !matrix.use_cross }}
        run: cargo build --target ${{ matrix.target }} --release

      - name: Build binary (Cross)
        if: matrix.use_cross
        run: cross build --target ${{ matrix.target }} --release

      - name: Prepare asset (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mv target\${{ matrix.target }}\release\mockforge.exe ${{ matrix.asset_name }}

      - name: Prepare asset (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mv target/${{ matrix.target }}/release/mockforge ${{ matrix.asset_name }}

      - name: Release Asset
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
